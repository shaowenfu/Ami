services:
  api:
    image: ${IMAGE_REF:?IMAGE_REF is required}
    container_name: ami-api
    env_file: .env.production
    environment:
      REDIS_HOST: redis
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: ${REDIS_IMAGE:?REDIS_IMAGE is required}
    container_name: ami-redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

volumes:
  redis_data:
    name: ami_redis_data

networks:
  default:
    name: ami_backend_network

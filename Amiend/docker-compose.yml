version: "3.9"

services:
  api:
    build: .
    container_name: ami-api
    env_file: .env
    environment:
      REDIS_HOST: redis
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-dev_redis_password}"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-dev_redis_password}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis-commander:
    image: rediscommander/redis-commander:latest
    profiles: ["ops"]
    environment:
      - REDIS_HOSTS=local:redis:6379:0:${REDIS_PASSWORD:-dev_redis_password}
    ports:
      - 127.0.0.1:8081:8081
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
    name: ami_redis_data

networks:
  default:
    name: ami_network

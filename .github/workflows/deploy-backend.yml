name: deploy-backend

on:
  push:
    branches:
      - main
    paths:
      - "Amiend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  DEFAULT_DEPLOY_DIR: /opt/ami-backend
  DEFAULT_REDIS_IMAGE: crpi-oatwdzh41nknuewb.cn-chengdu.personal.cr.aliyuncs.com/entrocut/redis:7-alpine

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate image configuration
        env:
          ACR_REGISTRY: ${{ vars.ACR_REGISTRY }}
          ACR_IMAGE_NAME: ${{ vars.ACR_IMAGE_NAME }}
          ACR_USERNAME: ${{ vars.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          for name in ACR_REGISTRY ACR_USERNAME ACR_IMAGE_NAME ACR_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              echo "Missing required deployment configuration: ${name}" >&2
              exit 1
            fi
          done

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.ACR_REGISTRY }}
          username: ${{ vars.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Extract image metadata
        id: meta
        shell: bash
        run: |
          IMAGE_REF="${{ vars.ACR_IMAGE_NAME }}:${GITHUB_SHA}"
          echo "image_ref=${IMAGE_REF}" >> "${GITHUB_OUTPUT}"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./Amiend
          file: ./Amiend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_ref }}
            ${{ vars.ACR_IMAGE_NAME }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate runtime configuration
        env:
          SERVER_SSH_HOST: ${{ secrets.SERVER_SSH_HOST }}
          SERVER_SSH_USER: ${{ secrets.SERVER_SSH_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          ACR_REGISTRY: ${{ vars.ACR_REGISTRY }}
          ACR_IMAGE_NAME: ${{ vars.ACR_IMAGE_NAME }}
          ACR_USERNAME: ${{ vars.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          MONGODB_ATLAS_URI: ${{ secrets.MONGODB_ATLAS_URI }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          MEM0_ENABLED: ${{ vars.MEM0_ENABLED || 'false' }}
          MEM0_API_KEY: ${{ secrets.MEM0_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          required_names=(
            SERVER_SSH_HOST
            SERVER_SSH_USER
            SERVER_SSH_KEY
            ACR_REGISTRY
            ACR_IMAGE_NAME
            ACR_USERNAME
            ACR_PASSWORD
            JWT_SECRET_KEY
            MONGODB_ATLAS_URI
            REDIS_PASSWORD
            LLM_API_KEY
          )
          for name in "${required_names[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "Missing required deployment configuration: ${name}" >&2
              exit 1
            fi
          done
          case "${MEM0_ENABLED}" in
            true|1|yes|on)
              if [ -z "${MEM0_API_KEY:-}" ]; then
                echo "Missing required deployment secret: MEM0_API_KEY because MEM0_ENABLED=true" >&2
                exit 1
              fi
              ;;
          esac

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_SSH_HOST }}
          username: ${{ secrets.SERVER_SSH_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "Amiend/docker-compose.production.yml,Amiend/deploy-production.sh"
          target: "${{ vars.DEPLOY_DIR || env.DEFAULT_DEPLOY_DIR }}"
          strip_components: 1
          timeout: 10m

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_DIR: ${{ vars.DEPLOY_DIR || env.DEFAULT_DEPLOY_DIR }}
          IMAGE_REF: ${{ needs.build-and-push.outputs.image_ref }}
          REDIS_IMAGE: ${{ vars.REDIS_IMAGE || env.DEFAULT_REDIS_IMAGE }}
          ACR_REGISTRY: ${{ vars.ACR_REGISTRY }}
          ACR_IMAGE_NAME: ${{ vars.ACR_IMAGE_NAME }}
          ACR_USERNAME: ${{ vars.ACR_USERNAME }}
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          CORS_ORIGINS: ${{ vars.CORS_ORIGINS || '*' }}
          MONGODB_ATLAS_URI: ${{ secrets.MONGODB_ATLAS_URI }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          MEM0_ENABLED: ${{ vars.MEM0_ENABLED || 'false' }}
          MEM0_API_KEY: ${{ secrets.MEM0_API_KEY }}
          SMTP_HOST: ${{ vars.SMTP_HOST }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ vars.SMTP_FROM }}
        with:
          host: ${{ secrets.SERVER_SSH_HOST }}
          username: ${{ secrets.SERVER_SSH_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: DEPLOY_DIR,IMAGE_REF,REDIS_IMAGE,ACR_REGISTRY,ACR_IMAGE_NAME,ACR_USERNAME,ACR_PASSWORD,CORS_ORIGINS,MONGODB_ATLAS_URI,JWT_SECRET_KEY,REDIS_PASSWORD,LLM_API_KEY,MEM0_ENABLED,MEM0_API_KEY,SMTP_HOST,SMTP_USERNAME,SMTP_PASSWORD,SMTP_FROM
          script_stop: true
          timeout: 20m
          command_timeout: 60m
          script: |
            set -euo pipefail
            mkdir -p "${DEPLOY_DIR}"
            cd "${DEPLOY_DIR}"
            bash ./deploy-production.sh
